<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泰語學習 App 7.9.2</title>
    <style>
        :root { --primary: #2980b9; --secondary: #e74c3c; --bg: #f4f7f6; --text: #333; --light-bg: #ecf0f1; --success: #27ae60; --danger: #c0392b; --warning: #f39c12; }
        body { font-family: 'Segoe UI', 'Leelawadee UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        header { background: white; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tabs { display: flex; overflow-x: auto; white-space: nowrap; background: #fff; padding: 5px 10px; border-bottom: 2px solid #ddd; gap: 8px; -webkit-overflow-scrolling: touch; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 0 0 auto; background: var(--light-bg); border: none; font-size: 0.95em; padding: 10px 18px; cursor: pointer; border-radius: 20px; transition: 0.3s; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; padding: 15px; max-width: 900px; margin: 0 auto; text-align: center; }
        .content-section.active { display: block; }
        button.action-btn { background: var(--secondary); color: white; border: none; padding: 12px 18px; font-size: 1em; border-radius: 8px; cursor: pointer; transition: 0.2s; margin: 5px; }
        .quiz-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; width: 100%; box-sizing: border-box; max-width: 550px; }
        .score-board { background: #fff8e1; border: 2px solid #f1c40f; padding: 8px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; font-size: 0.9em; color: #d35400; }
        .scope-toggles { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .scope-label { background: white; border: 1px solid #ccc; padding: 4px 10px; border-radius: 15px; font-size: 0.85em; cursor: pointer; color: #555; }
        .scope-label.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }
        .question { font-size: 2.2em; color: var(--primary); font-weight: bold; }
        input[type="text"] { font-size: 1.1em; padding: 12px; width: 85%; border: 2px solid #ddd; border-radius: 8px; text-align: center; margin-bottom: 10px; -webkit-appearance: none; }
        .feedback { margin-top: 15px; font-weight: bold; font-size: 1.1em; min-height: 30px; line-height: 1.4; }
        .mcq-btn { background: white; border: 2px solid var(--primary); color: var(--primary); padding: 15px; font-size: 1em; border-radius: 8px; cursor: pointer; margin-bottom: 8px; width: 100%; font-weight: bold; }
        .writing-layout { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 10px; }
        canvas { background: white; border: 2px dashed #bbb; border-radius: 8px; cursor: crosshair; touch-action: none; width: 100%; max-width: 350px; height: auto; aspect-ratio: 1 / 1; }
        .tutorial-card { background: white; padding: 15px; border-radius: 12px; width: 100%; max-width: 350px; box-sizing: border-box; }
        .mistake-grid, .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .speak-btn { background: #ecf0f1; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1.1em; }
        table { width: 100%; font-size: 0.9em; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>

    <header><h1>🇹🇭 泰語全方位學習系統</h1></header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('vocab-quiz')">📝 拼寫測驗</button>
        <button class="tab-btn" onclick="switchTab('listening-quiz')">🎧 聽力測驗</button>
        <button class="tab-btn" onclick="switchTab('mistakes-book')" style="background: #fff3e0; color: #d35400;">📖 錯題本</button>
        <button class="tab-btn" onclick="switchTab('writing')">✍️ 書寫練習</button>
        <button class="tab-btn" onclick="switchTab('units')">📚 單元字彙</button>
        <button class="tab-btn" onclick="switchTab('tables')">📊 字母總表</button> 
    </div>

    <div id="vocab-quiz" class="content-section active">
        <div class="quiz-card">
            <div class="quiz-scope-box" style="text-align:left; background:var(--light-bg); padding:10px; border-radius:8px; margin-bottom:15px;">
                <div style="font-weight:bold; margin-bottom:5px;">⚙️ 範圍：</div>
                <div class="scope-toggles" id="spell-scope-toggles"></div>
            </div>
            <div class="score-board">🏆 紀錄： <span style="color:var(--success)">對 <span id="spell-correct">0</span></span> | <span style="color:var(--danger)">錯 <span id="spell-wrong">0</span></span></div>
            <div style="display:flex; justify-content:center; align-items:center; margin-bottom:10px;">
                <div id="quiz-question" class="question" style="margin-right:10px;">載入中...</div>
                <button class="speak-btn" onclick="speakQuizWord()">🔊</button>
            </div>
            <p id="quiz-hint" style="color:#7f8c8d; font-size:0.85em;"></p>
            <input type="text" id="quiz-input" placeholder="輸入答案" onkeypress="handleEnter(event)">
            <br>
            <button class="action-btn" onclick="checkAnswer()">確認答案</button>
            <button class="action-btn" style="background:#95a5a6;" onclick="nextQuestion()">跳過</button>
            <div id="feedback" class="feedback"></div>
        </div>
    </div>

    <div id="listening-quiz" class="content-section">
        <div class="quiz-card">
            <div class="quiz-scope-box" style="text-align:left; background:var(--light-bg); padding:10px; border-radius:8px; margin-bottom:15px;">
                <div style="font-weight:bold; margin-bottom:5px;">⚙️ 範圍：</div>
                <div class="scope-toggles" id="listen-scope-toggles"></div>
            </div>
            <div class="score-board">🎯 紀錄： <span style="color:var(--success)">對 <span id="listen-correct">0</span></span> | <span style="color:var(--danger)">錯 <span id="listen-wrong">0</span></span></div>
            <button class="speak-btn" style="width:70px; height:70px; font-size:2em; background:var(--primary); color:white;" onclick="playListeningAudio()">🔊</button>
            <div id="listening-options" class="mcq-options" style="margin-top:15px;"></div>
            <div id="listening-feedback" class="feedback"></div>
            <button class="action-btn" style="background:#34495e;" onclick="nextListeningQuestion()">⏭️ 換題</button>
        </div>
    </div>

    <div id="mistakes-book" class="content-section">
        <h3>📖 專屬自動錯題本</h3>
        <div id="mistake-display-area"></div>
    </div>

    <div id="writing" class="content-section">
        <div class="tools">
            <button class="action-btn" style="background:#27ae60;" onclick="nextWritingPrompt()">✨ 換字</button>
            <button class="action-btn" style="background:#f39c12;" onclick="toggleTraceMode()" id="trace-btn">👁️ 底字:開</button>
            <button class="action-btn" onclick="clearCanvas()">🗑️ 清除</button>
        </div>
        <div class="writing-layout">
            <canvas id="drawingBoard" width="350" height="350"></canvas>
            <div class="tutorial-card">
                <div id="tutorial-thai" style="font-size:5em; color:var(--primary);">ก</div>
                <div id="tutorial-zh">gai</div>
                <button class="speak-btn" style="margin-top:10px;" onclick="speakThai(document.getElementById('tutorial-thai').innerText)">🔊</button>
            </div>
        </div>
    </div>

    <div id="units" class="content-section">
        <div class="unit-buttons" id="unit-btn-container" style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px; margin-bottom:15px;"></div>
        <div class="vocab-grid" id="unit-vocab-display"></div>
    </div>

    <div id="tables" class="content-section">
        <h3>中輔音</h3><table id="mid-cons-table"></table>
        <h3>高輔音</h3><table id="high-cons-table"></table>
        <h3>低輔音</h3><table id="low-cons-table"></table>
        <h3>元音</h3><table id="vowel-table"></table>
    </div>

        let spellSelectedUnits = new Set(["單元一"]); let listenSelectedUnits = new Set(["單元一"]);
        let activeSpellVocab = []; let activeListenVocab = []; let mistakeBook = JSON.parse(localStorage.getItem('thaiMistakes')) || {};

        function speakThai(t) { if('speechSynthesis' in window) { const u=new SpeechSynthesisUtterance(t); u.lang='th-TH'; u.rate=0.8; window.speechSynthesis.speak(u); } }
        function switchTab(id) { document.querySelectorAll('.content-section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById(id).classList.add('active'); event.currentTarget.classList.add('active'); if(id==='mistakes-book') renderMistakes(); }
        function initScopeToggle(id, set, cb) { const c=document.getElementById(id); c.innerHTML=''; for(let u in unitData) { const b=document.createElement('div'); b.className='scope-label '+(set.has(u)?'active':''); b.innerText=u.replace('單元',''); b.onclick=()=>{ if(set.has(u)) set.delete(u); else set.add(u); b.classList.toggle('active'); cb(); }; c.appendChild(b); } }
        function updateSpellScope() { activeSpellVocab=[]; spellSelectedUnits.forEach(u=>activeSpellVocab=activeSpellVocab.concat(unitData[u])); if(activeSpellVocab.length>0) nextQuestion(); }

        function recordAnswer(obj, corr) { const k=obj.thai; if(corr) { if(mistakeBook[k]) { mistakeBook[k].streak++; if(mistakeBook[k].streak>=5) delete mistakeBook[k]; saveMistakes(); } } else { if(!mistakeBook[k]) mistakeBook[k]={...obj,streak:0}; else mistakeBook[k].streak=0; saveMistakes(); } }
        function renderMistakes() { const d=document.getElementById('mistake-display-area'); d.innerHTML=''; const ks=Object.keys(mistakeBook); if(ks.length===0) { d.innerHTML='<div style="color:var(--success); padding:20px;">🎉 目前沒有錯題！</div>'; return; } const g=document.createElement('div'); g.className='mistake-grid'; ks.forEach(k=>{ const w=mistakeBook[k]; g.innerHTML+=`<div class="vocab-item" style="background:white; padding:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border-left:4px solid var(--danger);"><div><b style="font-size:1.2em; color:var(--danger);">${w.thai}</b><br><small>${w.zh} [${w.streak}/5]</small></div><button class="speak-btn" onclick="speakThai('${w.thai}')">🔊</button></div>`; }); d.appendChild(g); }

        let spellCurrent={}, spellQType='thai', sScore={c:0,w:0};
        function nextQuestion() { if(activeSpellVocab.length===0) return; spellCurrent=activeSpellVocab[Math.floor(Math.random()*activeSpellVocab.length)]; spellQType=Math.random()>0.5?'thai':'zh'; document.getElementById('quiz-question').innerText=spellCurrent[spellQType]; document.getElementById('quiz-hint').innerText=`請輸入${spellQType==='thai'?'中文':'泰文'}`; document.getElementById('quiz-input').value=''; document.getElementById('feedback').innerText=''; }
        function speakQuizWord() { speakThai(spellCurrent.thai); }
        function checkAnswer() { const input=document.getElementById('quiz-input').value.trim(); const ans=spellQType==='thai'?spellCurrent.zh:spellCurrent.thai; let isCorr=(input===ans); if(!isCorr && spellQType==='thai') { if(spellCurrent.zh.includes('/')) isCorr=spellCurrent.zh.split('/').map(s=>s.trim()).includes(input); if(!isCorr && spellCurrent.zh.includes('、')) isCorr=spellCurrent.zh.split('、').map(s=>s.trim()).includes(input); } const fb=document.getElementById('feedback'); if(isCorr) { fb.innerHTML=`✅ 對了！<br><span style="color:var(--primary); font-size:1.2em;">${spellCurrent.thai}</span> (${spellCurrent.zh})`; fb.style.color="var(--success)"; sScore.c++; recordAnswer(spellCurrent,true); setTimeout(nextQuestion,1200); } else { fb.innerHTML=`❌ 正確：<br><span style="color:var(--primary); font-size:1.2em;">${spellCurrent.thai}</span> (${spellCurrent.zh})`; fb.style.color="var(--danger)"; sScore.w++; recordAnswer(spellCurrent,false); } document.getElementById('spell-correct').innerText=sScore.c; document.getElementById('spell-wrong').innerText=sScore.w; }

        const canvas=document.getElementById('drawingBoard'); const ctx=canvas.getContext('2d'); let isDrawing=false, currentWriteTarget=null, traceMode=true;
        function drawTrace() { ctx.clearRect(0,0,canvas.width,canvas.height); if(traceMode && currentWriteTarget) { ctx.font="200px 'Leelawadee UI'"; ctx.fillStyle="rgba(200,200,200,0.3)"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(currentWriteTarget.char, canvas.width/2, canvas.height/2); } }

        function getPos(e) { const r=canvas.getBoundingClientRect(); const cx=e.clientX||e.touches[0].clientX; const cy=e.clientY||e.touches[0].clientY; return {x:cx-r.left, y:cy-r.top}; }
        canvas.addEventListener('touchstart', e=>{e.preventDefault(); isDrawing=true; const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y);},{passive:false});
        canvas.addEventListener('touchmove', e=>{if(!isDrawing)return; e.preventDefault(); const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle='#2c3e50'; ctx.lineWidth=6; ctx.lineCap='round'; ctx.stroke();},{passive:false});

            updateSpellScope(); updateListenScope(); nextWritingPrompt();
            const ub=document.getElementById('unit-btn-container');
            for(let u in unitData) { const btn=document.createElement('button'); btn.className='unit-btn'; btn.innerText=u; btn.onclick=()=>{ document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); const d=document.getElementById('unit-vocab-display'); d.innerHTML=''; unitData[u].forEach(w=>d.innerHTML+=`<div class="vocab-item" style="background:white; padding:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;"><div><b style="font-size:1.4em; color:var(--primary);">${w.thai}</b><br><small>${w.zh} [${w.roman}]</small></div><button class="speak-btn" onclick="speakThai('${w.thai}')">🔊</button></div>`); }; ub.appendChild(btn); }
            populateTable('mid-cons-table', midConsonants); populateTable('high-cons-table', highConsonants); populateTable('low-cons-table', lowConsonants); populateTable('vowel-table', allVowels);
        };
    </script>
</body>
</html>
